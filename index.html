    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: #0f172a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            width: 90%;
            max-width: 450px;
        }
        .profile-img {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 4px solid #ffffff;
            object-fit: cover;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            margin-bottom: 15px;
        }
        h1 { font-size: 2.2em; margin: 10px 0; letter-spacing: 1px; }
        .description { color: #94a3b8; margin-bottom: 30px; }
        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            margin-bottom: 15px;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1em;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .link-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        .youtube-btn { background-color: #ff0000; }
        .whatsapp-btn { background-color: #25d366; }
        .footer { margin-top: 40px; font-size: 0.8em; color: #64748b; }
    </style>
