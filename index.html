<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paulinter | Mis Redes</title>

    <!-- ============================================= -->
    <!-- METADATOS SEO Y OPEN GRAPH (RICH OG)          -->
    <!-- ============================================= -->
    <meta name="description" content="Paulinter | Descubre mis redes sociales, proyectos y contenido en un solo lugar.">
    <meta name="robots" content="index, follow">
    <meta name="author" content="Paulinter">

    <!-- Open Graph / Facebook / WhatsApp / LinkedIn -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://paulinter.github.io/githubpagetest/"> 
    <meta property="og:title" content="Paulinter | Mis Redes">
    <meta property="og:description" content="Entra y encuentra todos mis enlaces oficiales, redes sociales y proyectos en un solo lugar.">
    <meta property="og:image" content="images/logo.png"> 
    <meta property="og:image:width" content="500">
    <meta property="og:image:height" content="500">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:alt" content="Paulinter Logo y Redes Sociales">

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://paulinter.github.io/githubpagetest/">
    <meta name="twitter:title" content="Paulinter | Mis Redes">
    <meta name="twitter:description" content="Entra y encuentra todos mis enlaces oficiales, redes sociales y proyectos en un solo lugar.">
    <meta name="twitter:image" content="images/logo.png">
    <!-- ============================================= -->

    <!-- Ícono para las pestañas del navegador (PNG y Apple Touch) -->
    <link rel="icon" href="images/logo.png" type="image/png">
    <link rel="apple-touch-icon" href="images/logo.png">

    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        /* Modern Reset and Smooth Scrolling */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(-45deg, #090d16, #0f172a, #1e1b4b, #030712);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 20px 0;
        }

        /* Background animation */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphic Container */
        .container {
            text-align: center;
            width: 90%;
            max-width: 440px;
            padding: 40px 30px;
            border-radius: 24px;
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.5), 
                        inset 0 1px 1px rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            animation: containerAppear 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes containerAppear {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Subtly glowing backdrop blob */
        .container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .content-box {
            position: relative;
            z-index: 1;
        }

        /* Premium Circular Profile Image */
        .profile-img-container {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 20px auto;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.8);
            object-fit: cover;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4), 
                        0 0 20px rgba(99, 102, 241, 0.3);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                        border-color 0.3s ease;
        }

        .profile-img-container::after {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            border-radius: 50%;
            background: linear-gradient(45deg, #6366f1, #d946ef);
            z-index: -1;
            opacity: 0.5;
            filter: blur(8px);
            transition: opacity 0.3s ease;
        }

        .profile-img-container:hover .profile-img {
            transform: scale(1.08) rotate(3deg);
            border-color: #ffffff;
        }

        .profile-img-container:hover::after {
            opacity: 0.8;
        }

        /* Heading Typography */
        h1 {
            font-size: 2.4em;
            font-weight: 800;
            margin: 10px 0 5px 0;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff 30%, #c7d2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Subtitle */
        .description {
            font-size: 1.05em;
            color: #94a3b8;
            font-weight: 300;
            margin-bottom: 35px;
            letter-spacing: 0.3px;
        }

        /* Premium Buttons Base style */
        .link-btn {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px 24px;
            margin-bottom: 18px;
            color: #ffffff;
            text-decoration: none;
            border-radius: 16px;
            font-weight: 600;
            font-size: 1.05em;
            letter-spacing: 0.5px;
            overflow: hidden;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), 
                        box-shadow 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Button Hover scaling and glow */
        .link-btn:hover {
            transform: translateY(-4px);
        }

        /* YouTube Button Styling */
        .youtube-btn {
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
        }

        .youtube-btn:hover {
            box-shadow: 0 12px 25px rgba(220, 38, 38, 0.4), 
                        0 0 15px rgba(220, 38, 38, 0.2);
        }

        /* WhatsApp Button Styling */
        .whatsapp-btn {
            background: linear-gradient(135deg, #16a34a 0%, #15803d 100%);
        }

        .whatsapp-btn:hover {
            box-shadow: 0 12px 25px rgba(22, 163, 74, 0.4), 
                        0 0 15px rgba(22, 163, 74, 0.2);
        }

        /* Premium hover shine effect on buttons */
        .link-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                120deg,
                transparent,
                rgba(255, 255, 255, 0.15),
                transparent
            );
            transition: all 0.6s ease;
        }

        .link-btn:hover::before {
            left: 100%;
        }

        /* Footer */
        .footer {
            margin-top: 35px;
            font-size: 0.85em;
            font-weight: 300;
            color: #64748b;
            letter-spacing: 0.5px;
        }

        /* Extra micro-interactions: responsive touch feedback */
        .link-btn:active {
            transform: scale(0.98) translateY(-2px);
        }
    </style>
</head>
<body>
    <main class="container">
        <div class="content-box">
            <!-- Profile Avatar Image pointing to images/logo.png -->
            <div class="profile-img-container">
                <img src="images/logo.png" alt="Paulinter" class="profile-img">
            </div>
            
            <h1>Paulinter</h1>
            <p class="description">Bienvenido a mi espacio oficial</p>
            
            <!-- YouTube Channel Link Button -->
            <a href="https://www.youtube.com/@paulinter0909" target="_blank" class="link-btn youtube-btn" id="btn-youtube">
                MI CANAL DE YOUTUBE
            </a>
            
            <!-- WhatsApp Chat Link Button -->
            <a href="https://wa.me/51944662808" target="_blank" class="link-btn whatsapp-btn" id="btn-whatsapp">
                CONTÁCTAME POR WHATSAPP
            </a>
            
            <footer class="footer">© 2026 Paulinter. Reservados todos los derechos.</footer>
        </div>
    </main>
</body>
</html>
