  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #07080c;
      --card:      #0d1017;
      --card2:     #111520;
      --border:    #1a1f2e;
      --border2:   #232840;
      --cyan:      #00e5ff;
      --cyan-dim:  #00b8cc;
      --cyan-glow: rgba(0,229,255,.18);
      --violet:    #7b61ff;
      --white:     #eef2ff;
      --muted:     #5a6a8a;
      --muted2:    #8898bb;
      --btn-bg:    #10141f;
      --btn-hover: #161c2e;
      --radius:    16px;
      --font:      'Space Grotesk', system-ui, sans-serif;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--white);
      font-family: var(--font);
    }

    /* Noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(26,31,46,.6) 1px, transparent 1px),
        linear-gradient(90deg, rgba(26,31,46,.6) 1px, transparent 1px);
      background-size: 36px 36px;
      mask-image: radial-gradient(ellipse 90% 70% at 50% 0%, black 20%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* Glow blobs */
    .glow-top {
      position: fixed;
      top: -160px;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 500px;
      background: radial-gradient(ellipse, rgba(0,229,255,.10) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }
    .glow-bot {
      position: fixed;
      bottom: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(123,97,255,.07) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    /* Layout */
    main {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 16px 80px;
      min-height: 100vh;
    }

    /* Card */
    .card {
      width: 100%;
      max-width: 440px;
      background: var(--card);
      border: 1px solid var(--border2);
      border-radius: 28px;
      padding: 44px 32px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow:
        0 0 0 1px rgba(0,229,255,.05),
        0 0 60px rgba(0,229,255,.04),
        0 32px 80px rgba(0,0,0,.6);
      position: relative;
      overflow: hidden;
    }

    /* Shimmer line top of card */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), var(--violet), var(--cyan), transparent);
      opacity: .5;
    }

    /* Avatar */
    .avatar-wrap {
      position: relative;
      width: 96px;
      height: 96px;
      margin-bottom: 22px;
    }
    .avatar-ring {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: conic-gradient(var(--cyan) 0%, var(--violet) 40%, #ff6bcb 70%, var(--cyan) 100%);
      animation: spin 5s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .avatar-inner {
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      background: var(--card);
      z-index: 1;
    }
    .avatar-wrap img {
      position: absolute;
      inset: 5px;
      border-radius: 50%;
      object-fit: cover;
      z-index: 2;
      width: calc(100% - 10px);
      height: calc(100% - 10px);
    }

    /* Badge */
    .badge {
      position: absolute;
      bottom: 0; right: 0;
      z-index: 3;
      background: linear-gradient(135deg, var(--cyan), var(--violet));
      border-radius: 50%;
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      box-shadow: 0 0 10px rgba(0,229,255,.5);
      border: 2px solid var(--card);
    }

    /* Name / handle */
    .name {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -.025em;
      color: var(--white);
      line-height: 1.1;
    }
    .handle {
      font-size: .825rem;
      color: var(--cyan);
      margin-top: 5px;
      margin-bottom: 8px;
      font-weight: 600;
      letter-spacing: .03em;
      text-transform: uppercase;
    }
    .bio {
      font-size: .875rem;
      color: var(--muted2);
      text-align: center;
      line-height: 1.55;
      margin-bottom: 10px;
    }

    /* Stats row */
    .stats {
      display: flex;
      gap: 24px;
      margin-bottom: 28px;
      margin-top: 4px;
    }
    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .stat-val {
      font-size: .9rem;
      font-weight: 700;
      color: var(--cyan);
    }
    .stat-lbl {
      font-size: .7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .stat-dot {
      width: 1px;
      height: 28px;
      background: var(--border2);
      align-self: center;
    }

    /* Divider */
    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border2), transparent);
      margin-bottom: 26px;
    }

    /* Section label */
    .section-lbl {
      width: 100%;
      font-size: .68rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .1em;
      font-weight: 600;
      margin-bottom: 14px;
    }

    /* Links */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 11px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 14px 18px;
      background: var(--btn-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--white);
      text-decoration: none;
      font-family: var(--font);
      font-size: .9375rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .18s, border-color .2s, transform .14s, box-shadow .2s;
      position: relative;
      overflow: hidden;
    }
    .link-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 40%, rgba(255,255,255,.03) 100%);
      pointer-events: none;
    }
    .link-btn:hover {
      background: var(--btn-hover);
      border-color: rgba(0,229,255,.35);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,.35), 0 0 0 1px rgba(0,229,255,.08);
    }
    .link-btn:active { transform: translateY(0); }

    .link-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .link-icon svg { width: 21px; height: 21px; }

    .link-icon--yt  { background: rgba(255,0,0,.12); border: 1px solid rgba(255,0,0,.15); }
    .link-icon--wa  { background: rgba(37,211,102,.12); border: 1px solid rgba(37,211,102,.15); }
    .link-icon--ig  { background: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); border: 1px solid rgba(255,255,255,.12); }
    .link-icon--web { background: rgba(0,229,255,.08); border: 1px solid rgba(0,229,255,.12); }

    .link-label {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .link-label span:first-child {
      font-size: .75rem;
      color: var(--muted);
      font-weight: 500;
      letter-spacing: .02em;
    }
    .link-label span:last-child {
      font-size: .9375rem;
      color: var(--white);
      font-weight: 600;
    }

    .link-arrow {
      margin-left: auto;
      color: var(--muted);
      font-size: 1.15rem;
      transition: color .18s, transform .18s;
    }
    .link-btn:hover .link-arrow {
      color: var(--cyan);
      transform: translateX(2px);
    }

    /* Pulse dot */
    .pulse {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      margin-left: auto;
      margin-right: 6px;
      box-shadow: 0 0 0 0 rgba(34,197,94,.4);
      animation: pulse 2s ease infinite;
      flex-shrink: 0;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(34,197,94,.5); }
      70%  { box-shadow: 0 0 0 7px rgba(34,197,94,0); }
      100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
    }

    /* Footer */
    footer {
      margin-top: 28px;
      font-size: .72rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.7;
    }
    footer a { color: var(--cyan); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @media (prefers-reduced-motion: reduce) {
      .avatar-ring { animation: none; }
      .pulse { animation: none; }
      .link-btn { transition: none; }
    }
  </style>
</head>
